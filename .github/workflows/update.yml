name: Update quiniela scores
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate data.json
        run: python scripts/espn_sync_action.py
      - name: Commit if changed
        run: |
          git config user.name "quiniela-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet --cached || git commit -m "Update scores"
          git push
